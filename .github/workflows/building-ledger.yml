name: 🏗️ 건축물대장 자동입력
on:
  workflow_dispatch:
    inputs:
      page_id:
        description: '빌딩 페이지 ID'
        required: true
jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install requests
    
    - name: Run building bot
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        SEOUL_API_KEY: ${{ secrets.SEOUL_API_KEY }}
      run: python building_bot.py "${{ github.event.inputs.page_id }}"
