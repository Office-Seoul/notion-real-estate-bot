name: 📍 Vworld 주소검색
on:
  workflow_dispatch:
    inputs:
      page_id:
        description: '빌딩 페이지 ID'
        required: true
      keyword:
        description: '검색할 주소'
        default: '강남구 역삼동'
jobs:
  search:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: pip install requests
    
    - name: Run address bot
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        VWORLD_KEY: ${{ secrets.VWORLD_KEY }}
      run: python address_bot.py "${{ github.event.inputs.page_id }}" "${{ github.event.inputs.keyword }}"
